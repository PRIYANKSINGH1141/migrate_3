name: gha-migration/migrate_full_ci

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: demo-app
  BUILD_DIR: build

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-${{ github.sha }}

      - name: Prepare Environment
        run: |
          echo "Pipeline Started"
          docker --version
          mkdir -p $BUILD_DIR
          echo "Environment Ready"
  build:
    needs: prepare
    runs-on: ubuntu-latest

    env:
      BUILD_DIR: build
      TEST_SECRET: ${{ secrets.TEST_SECRET }}
      TEST_VAR: ${{ vars.TEST_VAR }}

    steps:
      - uses: actions/checkout@v4

      - run: |
          mkdir -p $BUILD_DIR
          echo "Application Build Successful" > $BUILD_DIR/build.txt
          echo "Build Time: $(date)" >> $BUILD_DIR/build.txt
          echo "$TEST_SECRET"
  

      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: build

  lint:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - run: |
          echo "Running Lint..."
          cat build/build.txt
          echo "Lint Passed"
  test:
    needs:
      - build
      - lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - run: |
          echo "Running Tests..."
          cat build/build.txt
          echo "All Tests Passed"
  security_scan:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - run: |
          echo "Running Security Scan..."
          echo "No Vulnerabilities Found"
  package:
    needs:
      - test
      - security_scan

    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - run: tar -czf package.tar.gz build

      - uses: actions/upload-artifact@v4
        with:
          name: package
          path: package.tar.gz

  docker_build:
    needs: package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: package

      - run: tar -xzf package.tar.gz

      - name: Build Docker Image
        run: docker build -t $APP_NAME:latest .

      - name: Verify Docker Image
        run: docker image inspect $APP_NAME:latest

      - name: Run Docker Container
        run: docker run --rm $APP_NAME:latest

  deploy_dev:
    needs: docker_build
    runs-on: ubuntu-latest
    environment: development

    steps:
      - run: |
          echo "Deploying to Development..."
          sleep 2
          echo "Development Deployment Successful"
  deploy_qa:
    needs: deploy_dev
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - run: |
          echo "Deploying to QA..."
          sleep 2
          echo "QA Deployment Successful"
  deploy_prod:
    needs: deploy_qa
    runs-on: ubuntu-latest
    environment: production

    steps:
      - run: |
          echo "Deploying to Production..."
          sleep 2
          echo "Production Deployment Successful"
