name: gha-migration/migrate_full_ci

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: demo-app
  BUILD_DIR: build

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-${{ github.sha }}

      - name: Start Pipeline
        run: echo "Pipeline Started"

      - name: Docker Version
        run: docker --version

      - name: Prepare Environment
        run: |
          mkdir -p $BUILD_DIR
          echo "Environment Ready"

      - name: Finish
        if: always()
        run: echo "Prepare Job Finished"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-${{ github.sha }}

      - name: Build Application
        run: |
          mkdir -p $BUILD_DIR
          echo "Application Build Successful" > $BUILD_DIR/build.txt
          echo "Build Time: $(date)" >> $BUILD_DIR/build.txt

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build

  lint:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - name: Run Lint
        run: |
          ls -la build
          cat build/build.txt
          echo "Lint Successful"

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - name: Run Tests
        run: |
          cat build/build.txt
          echo "Running Tests..."
          echo "All Tests Passed"

  security_scan:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - name: Security Scan
        run: |
          echo "Running Security Scan..."
          echo "No Vulnerabilities Found"

  package:
    needs:
      - lint
      - test
      - security_scan

    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - name: Create Package
        run: |
          tar -czf package.tar.gz build

      - uses: actions/upload-artifact@v4
        with:
          name: package
          path: package.tar.gz

  docker_build:
    needs: package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: package

      - name: Extract Package
        run: tar -xzf package.tar.gz

      - name: Build Docker Image
        run: |
          docker build -t $APP_NAME:latest .

      - name: Verify Image
        run: docker image inspect $APP_NAME:latest

      - name: Run Container
        run: docker run --rm $APP_NAME:latest

  deploy_dev:
    if: github.ref == 'refs/heads/develop'
    needs: docker_build
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Deploy Development
        run: |
          echo "Deploying to Development..."
          echo "Deployment Successful"

  deploy_qa:
    if: github.ref == 'refs/heads/develop'
    needs: deploy_dev
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Deploy QA
        run: |
          echo "Deploying to QA..."
          echo "Deployment Successful"

  deploy_prod:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/develop'
    needs: deploy_qa
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy Production
        run: |
          echo "Deploying to Production..."
          echo "Production Deployment Successful"
